apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arvis-ingress
  namespace: arvis-booking
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - arvisx.com
        - api.arvisx.com
      secretName: arvis-tls-cert
  rules:
    - host: arvisx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arvis-frontend-service
                port:
                  number: 80
    - host: api.arvisx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arvis-backend-service
                port:
                  number: 4000
