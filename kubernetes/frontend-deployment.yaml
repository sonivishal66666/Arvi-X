apiVersion: apps/v1
kind: Deployment
metadata:
  name: arvis-frontend
  namespace: arvis-booking
  labels:
    app: arvis-frontend
    tier: web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: arvis-frontend
  template:
    metadata:
      labels:
        app: arvis-frontend
    spec:
      containers:
        - name: frontend
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/arvis-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.arvisx.com"
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 2
