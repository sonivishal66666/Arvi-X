apiVersion: apps/v1
kind: Deployment
metadata:
  name: arvis-backend
  namespace: arvis-booking
  labels:
    app: arvis-backend
    tier: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: arvis-backend
  template:
    metadata:
      labels:
        app: arvis-backend
    spec:
      containers:
        - name: backend
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/arvis-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: arvis-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: arvis-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: arvis-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: arvis-secrets
                  key: JWT_REFRESH_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 2
