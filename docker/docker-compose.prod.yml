version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: arvis-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites:/etc/nginx/sites-enabled
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
    depends_on:
      - web
      - api
    networks:
      - arvis-network

  postgres:
    image: postgres:16-alpine
    container_name: arvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: arvis_x
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arvis-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arvis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - arvis-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    container_name: arvis-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/arvis_x?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CASHFREE_APP_ID: ${CASHFREE_APP_ID}
      CASHFREE_SECRET_KEY: ${CASHFREE_SECRET_KEY}
      CASHFREE_API_URL: ${CASHFREE_API_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arvis-network

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: production
    container_name: arvis-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.arvisx.com
      NEXT_PUBLIC_WS_URL: wss://api.arvisx.com
      NEXT_PUBLIC_CASHFREE_APP_ID: ${CASHFREE_APP_ID}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - api
    networks:
      - arvis-network

volumes:
  postgres_data:
  redis_data:
  certbot_data:

networks:
  arvis-network:
    driver: bridge
